# Cloudflare Worker — School Climate Hub chat backend.
# Deploy:   wrangler deploy
# Logs:     wrangler tail
# Secret:   wrangler secret put ANTHROPIC_API_KEY
#
# Custom domain (chat.schoolclimatehub.org) is configured AFTER first deploy
# via the Cloudflare dashboard once the schoolclimatehub.org DNS settles.
# Until then the Worker is reachable at:
#   https://school-climate-hub-chat.<account>.workers.dev

name = "school-climate-hub-chat"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# Worker lives on Reza's personal Cloudflare account; the schoolclimatehub.org
# zone lives on Bt.saas. Routing chat.schoolclimatehub.org → this Worker needs
# either (a) Workers Admin role for Reza on Bt.saas, or (b) the Worker moved
# to Bt.saas. Until one of those lands the dashboard hits workers.dev directly.

# Free observability — Worker logs visible via `wrangler tail` + dashboard.
[observability]
enabled = true
