# Cloudflare Worker — School Climate Hub chat backend.
# Deploy:   wrangler deploy
# Logs:     wrangler tail
# Secret:   wrangler secret put ANTHROPIC_API_KEY
#
# Custom domain (chat.schoolclimatehub.org) is configured AFTER first deploy
# via the Cloudflare dashboard once the schoolclimatehub.org DNS settles.
# Until then the Worker is reachable at:
#   https://school-climate-hub-chat.<account>.workers.dev

name = "school-climate-hub-chat"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# NOTE: Cannot bind chat.schoolclimatehub.org via `routes` here because the
# zone lives on a different Cloudflare account (Sulman's) than this Worker
# (Reza's). For the UNICEF prototype the dashboard uses the workers.dev URL
# directly. To enable the vanity domain later, either move the zone to this
# account or have the zone owner add a Worker Route from their dashboard.

# Free observability — Worker logs visible via `wrangler tail` + dashboard.
[observability]
enabled = true
